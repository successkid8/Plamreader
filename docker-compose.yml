version: '3.8'

services:
  palmora:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PALM_READER_VISION_MODEL=${PALM_READER_VISION_MODEL:-gpt-4o}
      - PALM_READER_IMAGE_MODEL=${PALM_READER_IMAGE_MODEL:-dall-e-3}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - palmora-network

  # Optional: Add nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - palmora
    networks:
      - palmora-network
    restart: unless-stopped

networks:
  palmora-network:
    driver: bridge